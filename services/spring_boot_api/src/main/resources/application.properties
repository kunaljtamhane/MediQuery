# Person C — Spring Boot Configuration
server.port=8080

# Kafka
spring.kafka.bootstrap-servers=${KAFKA_BOOTSTRAP_SERVERS:localhost:9092}
spring.kafka.producer.key-serializer=org.apache.kafka.common.serialization.StringSerializer
spring.kafka.producer.value-serializer=org.apache.kafka.common.serialization.StringSerializer
spring.kafka.producer.acks=all
spring.kafka.producer.retries=3
kafka.topic.documents=${KAFKA_TOPIC_DOCUMENTS:documents}

# Python agent service URL (set via env or docker-compose)
agent.service.url=${AGENT_SERVICE_URL:http://agents:8004}

# Logging (JSON-friendly output)
logging.pattern.console={"time":"%d{yyyy-MM-dd HH:mm:ss}","level":"%p","logger":"%logger{36}","msg":"%msg"}%n
