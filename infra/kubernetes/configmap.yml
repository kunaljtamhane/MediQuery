# Person B — Shared ConfigMap (Weeks 3-4)
# Holds non-secret config shared across all services.
# Secrets (API keys) go in Kubernetes Secrets, not here.

apiVersion: v1
kind: ConfigMap
metadata:
  name: capstone-config
  namespace: default
data:
  KAFKA_TOPIC_DOCUMENTS: "documents"
  CHROMA_HOST: "qdrant-service"
  CHROMA_PORT: "8000"
  REDIS_HOST: "redis-service"
  REDIS_PORT: "6379"
  EMBEDDING_SERVICE_URL: "http://embedding-service:8001"
  RAG_SERVICE_URL: "http://rag-service:8002"
  REWARD_MODEL_URL: "http://reward-model-service:8003"
  AGENT_SERVICE_URL: "http://agents-service:8004"
  CHUNK_SIZE: "512"
  CHUNK_OVERLAP: "64"
  LLM_PROVIDER: "bedrock"
