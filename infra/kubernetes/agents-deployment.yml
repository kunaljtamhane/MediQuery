# Person B — Agents Service K8s Deployment (Weeks 3-4)
apiVersion: apps/v1
kind: Deployment
metadata:
  name: agents
  labels:
    app: agents
spec:
  replicas: 1
  selector:
    matchLabels:
      app: agents
  template:
    metadata:
      labels:
        app: agents
    spec:
      containers:
        - name: agents
          image: ACCOUNT_ID.dkr.ecr.us-east-1.amazonaws.com/capstone/agents:latest
          ports:
            - containerPort: 8004
          envFrom:
            - configMapRef:
                name: capstone-config
            - secretRef:
                name: capstone-secrets
          livenessProbe:
            httpGet:
              path: /health
              port: 8004
            initialDelaySeconds: 30
            periodSeconds: 15
          resources:
            requests:
              memory: "512Mi"
              cpu: "250m"
            limits:
              memory: "1Gi"
              cpu: "500m"
---
apiVersion: v1
kind: Service
metadata:
  name: agents-service
spec:
  selector:
    app: agents
  ports:
    - port: 8004
      targetPort: 8004
